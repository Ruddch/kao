  <meta charset="utf-8">
  <meta name="viewport" content="width=1500">
  <title>カオモジ — X header banner 1500×500</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&amp;family=M+PLUS+Rounded+1c:wght@800;900&amp;family=Noto+Sans+JP:wght@700;900&amp;family=Zen+Kaku+Gothic+New:wght@900&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        oklch(99% 0.01 95);
      --surface:   oklch(100% 0 0);
      --fg:        oklch(18% 0.02 260);
      --muted:     oklch(42% 0.03 260);
      --border:    oklch(75% 0.04 260);
      --accent:    oklch(58% 0.24 25);
      --pop-red:    oklch(58% 0.26 25);
      --pop-yellow: oklch(88% 0.18 95);
      --pop-cyan:   oklch(78% 0.14 210);
      --pop-blue:   oklch(55% 0.2 250);
      --font-display: 'M PLUS Rounded 1c', 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
      --font-body:    'Noto Sans JP', 'Hiragino Sans', sans-serif;
      --font-mono:    'DotGothic16', ui-monospace, monospace;
      --strip-w: 82px;
      --content-gap: 240px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1500px;
      height: 500px;
      overflow: hidden;
      background: var(--fg);
    }

    .banner {
      position: relative;
      width: 1500px;
      height: 500px;
      overflow: hidden;
      background: var(--pop-yellow);
      color: var(--fg);
      font-family: var(--font-body);
    }

    /* Left: decorative poster-edge band */
    .campaign-strip {
      position: absolute;
      left: 0;
      top: 0;
      width: var(--strip-w);
      height: 100%;
      z-index: 3;
      display: grid;
      grid-template-columns: 28px 1fr 22px;
      border-right: 4px solid var(--fg);
    }

    .strip-edge {
      background: var(--pop-cyan);
      border-right: 3px solid var(--fg);
    }

    .strip-core {
      background: var(--pop-red);
    }

    .strip-badge,
    .strip-vertical-main { display: none; }

    .strip-rail {
      background:
        repeating-linear-gradient(
          180deg,
          var(--pop-blue) 0,
          var(--pop-blue) 14px,
          var(--fg) 14px,
          var(--fg) 16px
        );
      border-left: 3px solid var(--fg);
    }

    .bg-speed {
      position: absolute;
      inset: 0;
      background:
        var(--pop-yellow),
        radial-gradient(ellipse 75% 110% at 52% 48%, var(--surface) 0%, transparent 68%);
      z-index: 0;
    }

    .rail-tate {
      position: absolute;
      right: 0;
      top: 0;
      width: 44px;
      height: 100%;
      background: var(--pop-cyan);
      border-left: 3px solid var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 4;
    }

    .rail-tate span {
      writing-mode: vertical-rl;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
    }

    .content {
      position: absolute;
      left: calc(var(--strip-w) + var(--content-gap));
      right: 44px;
      top: 0;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1.15fr;
      align-items: center;
      padding: 28px 36px 28px 16px;
      gap: 44px;
      z-index: 2;
    }

    .hero-kao-wrap {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 400px;
    }

    /* Single poster plate behind kaomoji */
    .hero-plate {
      position: absolute;
      width: 400px;
      height: 220px;
      z-index: 0;
      pointer-events: none;
      background: var(--pop-red);
      border: 4px solid var(--fg);
      transform: rotate(-4deg);
      box-shadow: 8px 8px 0 var(--fg);
    }

    .hero-kao {
      position: relative;
      z-index: 2;
      font-family: var(--font-body);
      font-size: 96px;
      font-weight: 700;
      line-height: 1;
      text-align: center;
      padding: 24px 32px;
      background: var(--surface);
      border: 4px solid var(--fg);
      box-shadow: 8px 8px 0 var(--fg);
      transform: rotate(-2deg);
      white-space: nowrap;
      letter-spacing: 0;
    }

    .sticker-new {
      position: absolute;
      top: 18px;
      right: 10%;
      z-index: 5;
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 700;
      background: var(--pop-yellow);
      color: var(--fg);
      border: 3px solid var(--fg);
      padding: 6px 12px;
      transform: rotate(8deg);
      box-shadow: 4px 4px 0 var(--fg);
      max-width: 11em;
      line-height: 1.2;
      text-align: center;
    }

    .sticker-free {
      position: absolute;
      bottom: 36px;
      right: 6%;
      left: auto;
      z-index: 5;
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 700;
      background: var(--pop-cyan);
      color: var(--fg);
      border: 3px solid var(--fg);
      padding: 6px 16px;
      transform: rotate(-6deg);
      box-shadow: 4px 4px 0 var(--fg);
      letter-spacing: 0.08em;
    }

    .copy-block {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
      padding-left: 4px;
    }

    .kicker {
      display: inline-block;
      align-self: flex-start;
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: 700;
      background: var(--fg);
      color: var(--surface);
      border: 2px solid var(--fg);
      padding: 7px 18px;
      letter-spacing: 0.06em;
    }

    .brand-mark {
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 900;
      color: var(--pop-red);
      text-shadow: 2px 2px 0 var(--pop-yellow), 4px 4px 0 var(--fg);
      line-height: 1;
      margin-bottom: 2px;
    }

    .slogan-main {
      font-family: var(--font-display);
      font-size: 60px;
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -0.02em;
      max-width: 13ch;
    }

    .slogan-main em {
      font-style: normal;
      color: var(--pop-red);
      background: linear-gradient(transparent 62%, color-mix(in oklch, var(--pop-yellow) 85%, transparent) 62%);
    }

    .slogan-sub {
      font-size: 22px;
      font-weight: 700;
      max-width: 32ch;
      line-height: 1.35;
      border-left: 6px solid var(--pop-red);
      padding-left: 14px;
      color: var(--muted);
    }

    .edge-band {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 12px;
      background: var(--pop-red);
      border-top: 3px solid var(--fg);
      z-index: 3;
    }
  </style>
