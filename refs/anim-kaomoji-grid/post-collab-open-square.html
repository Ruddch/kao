<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080">
  <title>カオモジ — Collab Open 1080×1080</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+Rounded+1c:wght@800;900&family=Noto+Sans+JP:wght@700;900&family=Noto+Sans+Symbols+2&display=block" rel="stylesheet">
  <style>
    :root {
      --fg:         oklch(18% 0.02 260);
      --surface:    oklch(100% 0 0);
      --pop-red:    oklch(58% 0.26 25);
      --pop-yellow: oklch(88% 0.18 95);
      --pop-cyan:   oklch(78% 0.14 210);
      --pop-blue:   oklch(55% 0.2 250);
      --pop-green:  oklch(68% 0.16 145);
      --pop-pink:   oklch(72% 0.18 350);
      --pop-orange: oklch(72% 0.2 55);
      --font-display: 'M PLUS Rounded 1c', 'Noto Sans JP', sans-serif;
      --font-kao:     'Noto Sans JP', 'Noto Sans Symbols 2', 'Segoe UI Symbol', sans-serif;
      --font-mono:    'DotGothic16', ui-monospace, monospace;
      --gap: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1080px; overflow: hidden; }

    .post {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: var(--pop-yellow);
      color: var(--fg);
      display: grid;
      gap: var(--gap);
      grid-template-rows: 44px 72px 1fr 72px 44px;
      grid-template-columns: 48px 1fr 48px;
      grid-template-areas:
        "strip strip strip"
        ".     top   .    "
        ".     hero  .    "
        ".     bot   .    "
        "sbot  sbot  sbot ";
    }

    .strip-top {
      grid-area: strip;
      background: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .strip-top span {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 700;
      color: var(--pop-yellow);
      white-space: nowrap;
      letter-spacing: 0.08em;
    }

    .strip-bot {
      grid-area: sbot;
      background: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .strip-bot span {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 700;
      color: var(--pop-yellow);
      white-space: nowrap;
      letter-spacing: 0.08em;
    }

    .flank {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: var(--gap);
      z-index: 2;
    }
    .flank--top { grid-area: top; }
    .flank--bot { grid-area: bot; }

    .k {
      flex: 1;
      max-width: 200px;
      font-family: var(--font-kao);
      font-weight: 700;
      font-kerning: none;
      font-variant-ligatures: none;
      font-feature-settings: "kern" 0, "liga" 0;
      line-height: 1;
      white-space: nowrap;
      border: 3px solid var(--fg);
      box-shadow: 4px 4px 0 var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }
    .bg-w { background: var(--surface); }
    .bg-c { background: var(--pop-cyan); }
    .bg-g { background: var(--pop-green); }
    .bg-p { background: var(--pop-pink); }
    .bg-o { background: var(--pop-orange); }
    .bg-b { background: var(--pop-blue); color: var(--surface); }

    .hero {
      grid-area: hero;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 16px 24px 24px;
      min-height: 0;
    }

    .open-chip {
      font-family: var(--font-mono);
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.14em;
      padding: 8px 18px;
      background: var(--pop-cyan);
      border: 3px solid var(--fg);
      box-shadow: 4px 4px 0 var(--fg);
    }

    .collab-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      width: 100%;
      max-width: 880px;
      padding: 12px 16px;
    }

    .kao-card {
      background: var(--surface);
      border: 5px solid var(--fg);
      box-shadow: 7px 7px 0 var(--fg);
      padding: 22px 28px;
      font-family: var(--font-kao);
      font-size: 84px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }
    .kao-card--left  { transform: rotate(-3deg); background: color-mix(in oklch, var(--pop-pink) 20%, var(--surface)); }
    .kao-card--right { transform: rotate(2deg);  background: color-mix(in oklch, var(--pop-cyan) 24%, var(--surface)); }

    .collab-x {
      font-family: var(--font-display);
      font-size: 52px;
      font-weight: 900;
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--pop-red);
      color: var(--surface);
      border: 4px solid var(--fg);
      box-shadow: 5px 5px 0 var(--fg);
      transform: rotate(-2deg);
      flex-shrink: 0;
    }

    .brand-chip {
      font-family: var(--font-display);
      font-size: 40px;
      font-weight: 900;
      color: var(--pop-red);
      text-shadow: 2px 2px 0 var(--pop-yellow), 4px 4px 0 var(--fg);
      letter-spacing: 0.04em;
      line-height: 1;
    }
  </style>
</head>
<body>
  <article class="post">
    <div class="strip-top">
      <span>☆ COLLAB ☆ コラボ ☆ OPEN ☆ COLLAB ☆ コラボ ☆ OPEN ☆ COLLAB ☆ コラボ ☆</span>
    </div>

    <div class="flank flank--top">
      <div class="k bg-c">ヽ(´▽`)/</div>
      <div class="k bg-w">(ﾉ◕ヮ◕)ﾉ</div>
      <div class="k bg-g">(・∀・)</div>
    </div>

    <div class="hero">
      <span class="open-chip">OPEN</span>
      <div class="collab-row">
        <div class="kao-card kao-card--left">(◕‿◕)</div>
        <div class="collab-x">×</div>
        <div class="kao-card kao-card--right">(◕ω◕)</div>
      </div>
      <p class="brand-chip">カオモジ</p>
    </div>

    <div class="flank flank--bot">
      <div class="k bg-p">(♥ω♥*)</div>
      <div class="k bg-o">＼(＾▽＾)／</div>
      <div class="k bg-b">٩(◕‿◕)۶</div>
    </div>

    <div class="strip-bot">
      <span>☆ @kaomojinft ☆ COLLAB OPEN ☆ @kaomojinft ☆ kaomoji.world ☆</span>
    </div>
  </article>
</body>
</html>
