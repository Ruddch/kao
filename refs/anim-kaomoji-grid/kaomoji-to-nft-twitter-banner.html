<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1500">
  <title>Kaomoji: от текста к NFT — Twitter Banner 1500×500</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+Rounded+1c:wght@800;900&family=Noto+Sans+JP:wght@700;900&family=Zen+Kaku+Gothic+New:wght@900&display=swap" rel="stylesheet">
  <style>
    :root {
      --fg:         oklch(18% 0.02 260);
      --surface:    oklch(100% 0 0);
      --pop-red:    oklch(58% 0.26 25);
      --pop-yellow: oklch(88% 0.18 95);
      --pop-cyan:   oklch(78% 0.14 210);
      --pop-blue:   oklch(55% 0.2 250);
      --pop-green:  oklch(68% 0.16 145);
      --pop-pink:   oklch(72% 0.18 350);
      --pop-orange: oklch(72% 0.2 55);
      --font-display: 'M PLUS Rounded 1c', 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
      --font-mono:    'DotGothic16', ui-monospace, monospace;
      --font-kao:     'Noto Sans JP', 'Noto Sans Symbols 2', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1500px;
      height: 500px;
      overflow: hidden;
    }

    .canvas {
      position: relative;
      width: 1500px;
      height: 500px;
      overflow: hidden;
      background: var(--pop-yellow);
    }

    /* Боковая полоса */
    .campaign-strip {
      position: absolute;
      left: 0; top: 0;
      width: 82px; height: 100%;
      z-index: 3;
      display: grid;
      grid-template-columns: 28px 1fr 22px;
      border-right: 4px solid var(--fg);
    }
    .strip-edge { background: var(--pop-cyan); border-right: 3px solid var(--fg); }
    .strip-core { background: var(--pop-red); }
    .strip-rail {
      background: repeating-linear-gradient(180deg, var(--pop-blue) 0, var(--pop-blue) 14px, var(--fg) 14px, var(--fg) 16px);
      border-left: 3px solid var(--fg);
    }

    .rail-tate {
      position: absolute; right: 0; top: 0;
      width: 44px; height: 100%;
      background: var(--pop-cyan);
      border-left: 3px solid var(--fg);
      display: flex; align-items: center; justify-content: center;
      z-index: 4;
    }
    .rail-tate span {
      writing-mode: vertical-rl;
      font-family: var(--font-mono);
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.2em; color: var(--fg);
    }

    /* === ГЛАВНАЯ КОМПОЗИЦИЯ === */
    .loupe {
      position: absolute;
      top: 0; bottom: 0;
      left: 160px; right: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      z-index: 2;
    }

    /* Левый — простой kaomoji */
    .left-card {
      background: var(--surface);
      border: 4px solid var(--fg);
      box-shadow: 5px 5px 0 var(--fg);
      padding: 28px 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .kao-left {
      font-family: var(--font-kao);
      font-weight: 700;
      font-size: 72px;
      line-height: 1;
      white-space: nowrap;
      color: var(--fg);
      font-kerning: none;
      font-variant-ligatures: none;
      font-feature-settings: "kern" 0, "liga" 0;
      letter-spacing: 2px;
    }

    /* === СТРЕЛКА === */
    .arrow-zone {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 40px;
      flex-shrink: 0;
    }

    .arrow-body {
      width: 100px;
      height: 12px;
      background: var(--fg);
      border-radius: 6px;
    }

    .arrow-tip {
      width: 0;
      height: 0;
      border-top: 24px solid transparent;
      border-bottom: 24px solid transparent;
      border-left: 32px solid var(--fg);
      margin-left: -3px;
    }

    /* Правый — NFT карточка, цветной фон */
    .right-card {
      background: var(--pop-pink);
      border: 5px solid var(--fg);
      box-shadow: 8px 8px 0 var(--fg);
      padding: 28px 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .kao-right {
      font-family: var(--font-kao);
      font-weight: 700;
      font-size: 72px;
      line-height: 1;
      white-space: nowrap;
      color: var(--surface);
      font-kerning: none;
      font-variant-ligatures: none;
      font-feature-settings: "kern" 0, "liga" 0;
      letter-spacing: 2px;
    }

    /* Нижняя полоса */
    .edge-band {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 14px;
      background: var(--pop-red);
      border-top: 3px solid var(--fg);
      z-index: 3;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <aside class="campaign-strip" aria-hidden="true">
      <div class="strip-edge"></div>
      <div class="strip-core"></div>
      <div class="strip-rail"></div>
    </aside>
    <div class="rail-tate" aria-hidden="true"><span>Kaomoji NFT</span></div>

    <div class="loupe">
      <!-- Левый: простой kaomoji на белом -->
      <div class="left-card">
        <span class="kao-left">( ＾▽＾ )</span>
      </div>

      <!-- Стрелка-переход -->
      <div class="arrow-zone" aria-hidden="true">
        <div class="arrow-body"></div>
        <div class="arrow-tip"></div>
      </div>

      <!-- Правый: сложный kaomoji на розовом фоне -->
      <div class="right-card">
        <span class="kao-right">( ๑•̀ㅂ•́)و✧</span>
      </div>
    </div>

    <div class="edge-band" aria-hidden="true"></div>
  </div>
</body>
</html>
