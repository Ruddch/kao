<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1500">
  <title>カオモジ — Kaomoji Culture Banner 1500×500</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+Rounded+1c:wght@800;900&family=Noto+Sans+JP:wght@700;900&family=Zen+Kaku+Gothic+New:wght@900&display=swap" rel="stylesheet">
  <style>
    :root {
      --fg:         oklch(18% 0.02 260);
      --surface:    oklch(100% 0 0);
      --pop-red:    oklch(58% 0.26 25);
      --pop-yellow: oklch(88% 0.18 95);
      --pop-cyan:   oklch(78% 0.14 210);
      --pop-blue:   oklch(55% 0.2 250);
      --pop-green:  oklch(68% 0.16 145);
      --pop-pink:   oklch(72% 0.18 350);
      --pop-orange: oklch(72% 0.2 55);
      --font-display: 'M PLUS Rounded 1c', 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
      --font-body:    'Noto Sans JP', 'Hiragino Sans', sans-serif;
      --font-mono:    'DotGothic16', ui-monospace, monospace;
      --strip-w: 82px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1500px;
      height: 500px;
      overflow: hidden;
      background: var(--fg);
    }

    .banner {
      position: relative;
      width: 1500px;
      height: 500px;
      overflow: hidden;
      background: var(--pop-yellow);
      color: var(--fg);
      font-family: var(--font-body);
    }

    /* Left campaign strip */
    .campaign-strip {
      position: absolute;
      left: 0;
      top: 0;
      width: var(--strip-w);
      height: 100%;
      z-index: 3;
      display: grid;
      grid-template-columns: 28px 1fr 22px;
      border-right: 4px solid var(--fg);
    }

    .strip-edge {
      background: var(--pop-cyan);
      border-right: 3px solid var(--fg);
    }

    .strip-core {
      background: var(--pop-red);
    }

    .strip-rail {
      background: repeating-linear-gradient(
        180deg,
        var(--pop-blue) 0,
        var(--pop-blue) 14px,
        var(--fg) 14px,
        var(--fg) 16px
      );
      border-left: 3px solid var(--fg);
    }

    .bg-speed {
      position: absolute;
      inset: 0;
      background:
        var(--pop-yellow),
        radial-gradient(ellipse 75% 110% at 52% 48%, var(--surface) 0%, transparent 68%);
      z-index: 0;
    }

    .rail-tate {
      position: absolute;
      right: 0;
      top: 0;
      width: 44px;
      height: 100%;
      background: var(--pop-cyan);
      border-left: 3px solid var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 4;
    }

    .rail-tate span {
      writing-mode: vertical-rl;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
    }

    .content {
      position: absolute;
      left: calc(var(--strip-w) + 200px);
      right: 44px;
      top: 0;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      align-items: center;
      padding: 28px 36px 28px 16px;
      gap: 44px;
      z-index: 2;
    }

    .hero-kao-wrap {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 400px;
    }

    .hero-plate {
      position: absolute;
      width: 420px;
      height: 240px;
      z-index: 0;
      pointer-events: none;
      background: var(--pop-red);
      border: 4px solid var(--fg);
      transform: rotate(-4deg);
      box-shadow: 8px 8px 0 var(--fg);
    }

    .hero-kao {
      position: relative;
      z-index: 2;
      font-family: var(--font-body);
      font-size: 108px;
      font-weight: 700;
      line-height: 1;
      text-align: center;
      padding: 24px 32px;
      background: var(--surface);
      border: 4px solid var(--fg);
      box-shadow: 8px 8px 0 var(--fg);
      transform: rotate(-2deg);
      white-space: nowrap;
      letter-spacing: 0;
    }

    .copy-block {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
      padding-left: 4px;
    }

    .kicker {
      display: inline-block;
      align-self: flex-start;
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: 700;
      background: var(--fg);
      color: var(--surface);
      border: 2px solid var(--fg);
      padding: 7px 18px;
      letter-spacing: 0.06em;
    }

    .brand-mark {
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 900;
      color: var(--pop-red);
      text-shadow: 2px 2px 0 var(--pop-yellow), 4px 4px 0 var(--fg);
      line-height: 1;
      margin-bottom: 2px;
    }

    .slogan-main {
      font-family: var(--font-display);
      font-size: 56px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.02em;
      max-width: 14ch;
    }

    .slogan-main em {
      font-style: normal;
      color: var(--pop-red);
      background: linear-gradient(transparent 62%, color-mix(in oklch, var(--pop-yellow) 85%, transparent) 62%);
    }

    .slogan-sub {
      font-size: 18px;
      font-weight: 700;
      max-width: 36ch;
      line-height: 1.4;
      border-left: 6px solid var(--pop-red);
      padding-left: 14px;
      color: var(--fg);
    }

    .culture-facts {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .fact {
      background: var(--surface);
      border: 2px solid var(--fg);
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
    }

    .fact-number {
      font-family: var(--font-mono);
      font-size: 16px;
      color: var(--pop-red);
      display: block;
    }

    .edge-band {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 12px;
      background: var(--pop-red);
      border-top: 3px solid var(--fg);
      z-index: 3;
    }
  </style>
</head>
<body>
  <article class="banner" role="img" aria-label="Kaomoji Culture Banner">
    <div class="bg-speed" aria-hidden="true"></div>

    <aside class="campaign-strip" aria-label="カルチャー帯">
      <div class="strip-edge" aria-hidden="true"></div>
      <div class="strip-core">
        <span class="strip-badge">カルチャー</span>
        <p class="strip-vertical-main">顔文字文化</p>
      </div>
      <div class="strip-rail" aria-hidden="true"></div>
    </aside>

    <div class="content">
      <div class="hero-kao-wrap">
        <div class="hero-plate" aria-hidden="true"></div>
        <p class="hero-kao">(✿╹◡╹)ﾉ</p>
      </div>

      <div class="copy-block">
        <p class="kicker">1986年から今日まで</p>
        <p class="brand-mark">カオモジ</p>
        <h1 class="slogan-main">顔文字<br /><em>カルチャー</em>のすべて</h1>
        <p class="slogan-sub">日本発のアスキーアート。感情を文字で表現する文化が、30年間でどう進化したかを紹介。</p>

        <div class="culture-facts">
          <div class="fact"><span class="fact-number">1986</span>初期在日</div>
          <div class="fact"><span class="fact-number">2000</span>インターネット普及</div>
          <div class="fact"><span class="fact-number">今</span>AI時代へ</div>
        </div>
      </div>
    </div>

    <div class="rail-tate" aria-hidden="true"><span>顔文字文化 Kaomoji Culture</span></div>

    <div class="edge-band" aria-hidden="true"></div>
  </article>
</body>
</html>
